name: Android (Upstream Style)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  warmup-android-cache:
    name: Warm up Android cache (unsigned)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: "./.github/shared_workflows/install_apt_dependencies"
      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          no-save-caches: true
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false
      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android
      - run: flutter config --no-cli-animations
      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: flutter pub get
      - run: ./patches/post/patch_rust_versions.sh
      - name: Build unsigned APK (cache warmup)
        run: flutter build apk --debug

  build-android:
    name: Build Android (Release style)
    runs-on: ubuntu-latest
    needs: [ warmup-android-cache ]
    steps:
      - uses: actions/checkout@v6
      - uses: "./.github/shared_workflows/install_apt_dependencies"
      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          no-save-caches: true
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false
      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android
      - run: flutter config --no-cli-animations
      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: flutter pub get
      - run: ./patches/post/patch_rust_versions.sh

      - name: Setup keystore (if secrets provided)
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/android.keystore
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ALIAS }}" >> android/key.properties
          echo "storeFile=../android.keystore" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release --verbose 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: build.log

      - name: Rename and upload APK
        if: success()
        run: |
          buildName=$(grep -oP "(?<=buildName = ').*(?=')" lib/data/version.dart)
          mkdir -p output
          apk_file=$(find build/app -name "*.apk" -print -quit)
          cp "$apk_file" "output/Saber_v${buildName}.apk"
        shell: bash
      - uses: actions/upload-artifact@v7
        if: success()
        with:
          name: Saber-Android
          path: output/*.apk
