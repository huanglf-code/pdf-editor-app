name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:stable-android
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: "./.github/shared_workflows/install_apt_dependencies"

      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          no-save-caches: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Setup keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        if: ${{ env.SIGNING_KEY != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/android.keystore
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ALIAS }}" >> android/key.properties
          echo "storeFile=../android.keystore" >> android/key.properties

      - name: Disable Flutter CLI animations
        run: flutter config --no-cli-animations

      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: flutter pub get
      - name: Generate code (build_runner, if present)
        run: |
          if grep -q "build_runner" pubspec.lock; then
            echo "build_runner found in pubspec.lock - running codegen"
            flutter pub run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not found - skipping code generation"
          fi
      - run: ./patches/post/patch_rust_versions.sh

      - name: Build apk
        run: flutter build apk --verbose 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: build.log

      - name: List APK outputs
        if: always()
        run: |
          echo "=== APK files under build/ ==="
          find build -name "*.apk" -print || echo "No APK files found"

      - name: Show build log if no APK
        if: always()
        run: |
          if [ ! -f build.log ]; then
            echo "No build.log found"
            exit 0
          fi
          if ! find build -name "*.apk" -print -quit 2>/dev/null | grep -q .; then
            echo "=== APK not found, showing last 500 lines of build.log ==="
            tail -500 build.log
          fi

      - name: Rename apk
        if: success()
        id: rename_apk
        run: |
          buildName=$(grep -oP "(?<=buildName = ').*(?=')" lib/data/version.dart)
          apkName="Saber_v${buildName}.apk"
          echo "apkName=$apkName" >> $GITHUB_OUTPUT

          mkdir -p output
          apk_file=$(find build/app/outputs -maxdepth 3 -name "app-release.apk" -print -quit)
          if [ -z "$apk_file" ]; then
            apk_file=$(find build/app/outputs -maxdepth 3 -name "app-arm64-v8a-release.apk" -print -quit)
          fi
          if [ -z "$apk_file" ]; then
            apk_file=$(find build/app/outputs -maxdepth 3 -name "app-*-release.apk" -print -quit)
          fi
          if [ -z "$apk_file" ]; then
            apk_file=$(find build/app -maxdepth 5 -name "*.apk" -print -quit)
          fi

          if [ -z "$apk_file" ]; then
            echo "No release APK found in build/app/outputs/flutter-apk" >&2
            exit 1
          fi

          cp "$apk_file" "output/$apkName"
          echo "Copied $apk_file -> output/$apkName"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: Saber-Android
          path: output/${{ steps.rename_apk.outputs.apkName }}

  build-android-debug:
    name: Build APK (Debug)
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:stable-android
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: "./.github/shared_workflows/install_apt_dependencies"

      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          no-save-caches: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Disable Flutter CLI animations
        run: flutter config --no-cli-animations

      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: flutter pub get
      - name: Generate code (build_runner, if present)
        run: |
          if grep -q "build_runner" pubspec.lock; then
            echo "build_runner found in pubspec.lock - running codegen"
            flutter pub run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not found - skipping code generation"
          fi
      - run: ./patches/post/patch_rust_versions.sh

      - name: Build debug APK
        run: flutter build apk --debug --verbose 2>&1 | tee build-debug.log

      - name: Upload debug build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log-debug
          path: build-debug.log

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Saber-Android-Debug
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
