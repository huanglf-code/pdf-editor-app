name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.0'

    - name: Get dependencies
      run: flutter pub get

    - name: Diagnose environment
      run: |
        echo "=== Rust version ==="
        rustc --version
        cargo --version
        echo "=== Flutter version ==="
        flutter --version
        echo "=== Dart version ==="
        dart --version
        echo "=== Java version ==="
        java -version
        echo "=== Android SDK ==="
        ls -la $ANDROID_HOME/ndk/ || echo "NDK not found"

    - name: Build APK
      run: flutter build apk --release 2>&1 | tee build.log

    - name: Find APK
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "=== Build directory structure ==="
        ls -la build/app/outputs/ 2>/dev/null || echo "build/app/outputs not found"
        ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "flutter-apk not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/*.apk
        if-no-files-found: warn
