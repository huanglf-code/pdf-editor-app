name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: "./.github/shared_workflows/install_apt_dependencies"

      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          no-save-caches: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Disable Flutter CLI animations
        run: flutter config --no-cli-animations

      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: flutter pub get
      - run: ./patches/post/patch_rust_versions.sh

      - name: Create signing key
        run: |
          mkdir -p android
          keytool -genkey -v -keystore android/release.keystore -keyalias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Saber,O=Saber,C=US"
          echo "storePassword=password" > android/key.properties
          echo "keyPassword=password" >> android/key.properties
          echo "keyAlias=release" >> android/key.properties
          echo "storeFile=release.keystore" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        id: rename_apk
        run: |
          buildName=$(grep -oP "(?<=buildName = ').*(?=')" lib/data/version.dart)
          apkName="Saber_v${buildName}.apk"
          echo "apkName=$apkName" >> $GITHUB_OUTPUT

          mkdir -p output
          mv build/app/outputs/flutter-apk/app-release.apk output/$apkName

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Saber-Android
          path: output/${{ steps.rename_apk.outputs.apkName }}
