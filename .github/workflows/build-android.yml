name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: "./.github/shared_workflows/install_apt_dependencies"

      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          no-save-caches: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Disable Flutter CLI animations
        run: flutter config --no-cli-animations

      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: flutter pub get
      - run: ./patches/post/patch_rust_versions.sh

      - name: Build APK (debug)
        run: flutter build apk --verbose 2>&1 | tee build.log
      
      - name: Show build log on failure
        if: failure()
        run: tail -300 build.log

      - name: Find APK files
        run: |
          echo "=== Looking for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Build directory structure ==="
          ls -la build/ 2>/dev/null || echo "build/ not found"
          echo ""
          echo "=== app directory ==="
          ls -la build/app/ 2>/dev/null || echo "build/app/ not found"
          echo ""
          echo "=== outputs directory ==="
          ls -la build/app/outputs/ 2>/dev/null || echo "build/app/outputs/ not found"

      - name: Rename APK
        id: rename_apk
        run: |
          buildName=$(grep -oP "(?<=buildName = ').*(?=')" lib/data/version.dart)
          apkName="Saber_v${buildName}.apk"
          echo "apkName=$apkName" >> $GITHUB_OUTPUT

          mkdir -p output
          # Try to find the APK file anywhere
          apk_file=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$apk_file" ]; then
            cp "$apk_file" output/$apkName
            echo "Found APK at: $apk_file"
          else
            echo "APK file not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Saber-Android
          path: output/${{ steps.rename_apk.outputs.apkName }}
