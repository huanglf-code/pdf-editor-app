name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: "./.github/shared_workflows/install_apt_dependencies"

      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          no-save-caches: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Disable Flutter CLI animations
        run: flutter config --no-cli-animations

      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: flutter pub get
      - run: ./patches/post/patch_rust_versions.sh

      - name: Build APK
        run: flutter build apk --verbose 2>&1 | tail -500

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Saber-Android
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
